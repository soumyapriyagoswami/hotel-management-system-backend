#############################################
# Hotel Management System Configuration
#############################################

spring.application.name=hotel-management-system

#############################################
# Database Configuration
#############################################

spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:XE
spring.datasource.username=YOUR_DATABASE_USERNAME
spring.datasource.password=YOUR_DATABASE_PASSWORD

#############################################
# JPA / Hibernate
#############################################

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.batch_size=20

#############################################
# Connection Pool
#############################################

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

#############################################
# Server
#############################################

server.port=8081
server.servlet.context-path=/

#############################################
# Logging
#############################################

logging.level.com.hotel.hotel_management_system=INFO
logging.level.org.hibernate=INFO
logging.level.org.springframework.web=INFO

#############################################
# Actuator
#############################################

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

#############################################
# Jackson
#############################################

spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.time-zone=UTC

#############################################
# JWT
#############################################

jwt.secret=YOUR_256_BIT_SECRET_KEY
jwt.expiration=86400000
jwt.refresh-expiration=604800000
jwt.issuer=hotel-management-system