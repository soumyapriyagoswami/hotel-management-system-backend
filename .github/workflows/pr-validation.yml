name: Pull Request Validation

on:
  pull_request:
    branches:
      - main
      - develop
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Validate Project
        run: mvn -B clean verify

      - name: Run Checkstyle (Optional)
        continue-on-error: true
        run: mvn checkstyle:check

      - name: Generate JaCoCo Report (Optional)
        continue-on-error: true
        run: mvn jacoco:report

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-test-report
          path: |
            target/surefire-reports
            target/failsafe-reports
          retention-days: 7

      - name: Upload JaCoCo Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco
          retention-days: 7

      - name: PR Summary
        if: always()
        run: |
          echo "## Pull Request Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build |  Completed |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests |  Completed |" >> $GITHUB_STEP_SUMMARY
          echo "| Checkstyle | Optional |" >> $GITHUB_STEP_SUMMARY
          echo "| JaCoCo | Optional |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**PR:** #${{ github.event.pull_request.number }}" >> $GITHUB_STEP_SUMMARY
          echo "**Source Branch:** ${{ github.head_ref }}" >> $GITHUB_STEP_SUMMARY
          echo "**Target Branch:** ${{ github.base_ref }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY