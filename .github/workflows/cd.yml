name: CD - Package and Prepare Release

on:
  workflow_run:
    workflows: ["Hotel Management System CI"]
    types:
      - completed

  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build Release
        run: mvn clean package -DskipTests

      - name: Create Release Folder
        run: |
          mkdir release
          cp target/*.jar release/

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v7
        with:
          name: hotel-management-release
          path: release/

      - name: Generate Deployment Summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Project:** Hotel Management System" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Java:** 17" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** Ready for deployment" >> $GITHUB_STEP_SUMMARY
          echo "**Build Time:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "**Artifacts:**" >> $GITHUB_STEP_SUMMARY
          ls -lh release >> $GITHUB_STEP_SUMMARY

      - name: Success
        if: success()
        run: echo "Release package generated successfully."

      - name: Failure
        if: failure()
        run: |
          echo "Release build failed."
          exit 1