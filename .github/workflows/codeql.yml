name: CodeQL

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  schedule:
    - cron: '30 3 * * 1'

jobs:

  analyze:

    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false

      matrix:
        language:
          - java

    steps:

      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: java

      - uses: github/codeql-action/autobuild@v3

      - uses: github/codeql-action/analyze@v3