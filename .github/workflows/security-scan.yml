name: Security Scan

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main

  schedule:
    - cron: '0 2 * * 0'

jobs:
  dependency-check:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build Project
        run: mvn clean package -DskipTests

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: Hotel Management System
          path: .
          format: HTML
          out: reports
          args: >
            --enableRetired

      - name: Upload Security Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-security-report
          path: reports

      - name: Security Summary
        if: always()
        run: |
          echo "## Security Scan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Project: Hotel Management System" >> $GITHUB_STEP_SUMMARY
          echo "- Scan: OWASP Dependency Check" >> $GITHUB_STEP_SUMMARY
          echo "- Java: 17" >> $GITHUB_STEP_SUMMARY
          echo "- Completed: $(date)" >> $GITHUB_STEP_SUMMARY