version: 2

updates:
  # Maven dependencies
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Kolkata"

    open-pull-requests-limit: 10

    labels:
      - "dependencies"
      - "security"

    commit-message:
      prefix: "deps"

    reviewers:
      - soumyapriyagoswami

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:15"
      timezone: "Asia/Kolkata"

    labels:
      - "github-actions"

    commit-message:
      prefix: "ci"